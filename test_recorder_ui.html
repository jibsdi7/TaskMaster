<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Recorder Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 5px;
            background: #333;
            color: #fff;
            font-size: 14px;
        }
        button {
            padding: 12px 24px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-record {
            background: #f44336;
            color: white;
        }
        .btn-record:hover {
            background: #d32f2f;
        }
        .btn-stop {
            background: #ff9800;
            color: white;
        }
        .btn-stop:hover {
            background: #f57c00;
        }
        .btn-stop:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background: #333;
        }
        .status.success {
            background: #1b5e20;
            border-left: 4px solid #4CAF50;
        }
        .status.error {
            background: #b71c1c;
            border-left: 4px solid #f44336;
        }
        .status.info {
            background: #01579b;
            border-left: 4px solid #2196F3;
        }
        .log {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
        }
        .log-entry.error {
            border-left-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 TaskMaster Recorder Test</h1>
        
        <div class="input-group">
            <label for="url">URL to Record:</label>
            <input type="text" id="url" placeholder="https://www.google.com" value="https://www.google.com">
        </div>

        <div class="input-group">
            <label for="token">Auth Token:</label>
            <input type="text" id="token" value="test-token-for-development" readonly>
        </div>

        <div>
            <button class="btn-record" onclick="startRecording()">🔴 Start Recording</button>
            <button class="btn-stop" id="stopBtn" onclick="stopRecording()" disabled>⏹️ Stop Recording</button>
        </div>

        <div id="status" class="status" style="display:none;"></div>

        <div class="log" id="log"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let sessionId = null;

        function log(message, isError = false) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' error' : '');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        async function startRecording() {
            const url = document.getElementById('url').value;
            const token = document.getElementById('token').value;

            if (!url) {
                showStatus('Please enter a URL', 'error');
                return;
            }

            log(`Starting recording for: ${url}`);
            showStatus('Starting recorder...', 'info');

            try {
                const response = await fetch(`${API_BASE}/api/recorder/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionId = data.session_id;
                    log(`✅ Recording started! Session ID: ${sessionId}`);
                    log(`Message: ${data.message}`);
                    showStatus('Recording started! Perform actions in the browser.', 'success');
                    
                    document.getElementById('stopBtn').disabled = false;
                    document.querySelector('.btn-record').disabled = true;
                } else {
                    log(`❌ Error: ${data.detail}`, true);
                    showStatus(`Error: ${data.detail}`, 'error');
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, true);
                showStatus(`Network error: ${error.message}`, 'error');
            }
        }

        async function stopRecording() {
            if (!sessionId) {
                showStatus('No active recording session', 'error');
                return;
            }

            log('Stopping recording...');
            showStatus('Stopping recorder...', 'info');

            try {
                const token = document.getElementById('token').value;
                const response = await fetch(`${API_BASE}/api/recorder/stop`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ save_as_workflow: false })
                });

                const data = await response.json();

                if (response.ok) {
                    log(`✅ Recording stopped! Captured ${data.actions_count} actions`);
                    log(`Actions: ${JSON.stringify(data.actions, null, 2)}`);
                    showStatus(`Recording stopped! Captured ${data.actions_count} actions`, 'success');
                    
                    sessionId = null;
                    document.getElementById('stopBtn').disabled = true;
                    document.querySelector('.btn-record').disabled = false;
                } else {
                    log(`❌ Error: ${data.detail}`, true);
                    showStatus(`Error: ${data.detail}`, 'error');
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, true);
                showStatus(`Network error: ${error.message}`, 'error');
            }
        }

        // Initialize
        log('TaskMaster Recorder Test UI loaded');
        log(`Backend API: ${API_BASE}`);
        log('Ready to start recording!');
    </script>
</body>
</html>
